<!-- Robot Hardware 06 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc">
  <title id="title">방향에 따라 바뀌는 백래시 접촉 상태</title>
  <desc id="desc">정방향 치면 접촉, 유격 통과, 역방향 치면 접촉의 세 상태</desc>
  <defs><style>text{font-family:Pretendard,"Noto Sans KR",sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.m{font-size:22px;font-weight:650}.s{font-size:17px;fill:#475569}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect width="1200" height="570" rx="24" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" class="h">One motor angle can correspond to multiple output states</text>
  <g transform="translate(60 105)">
    <rect width="300" height="315" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <path d="M55 120 h52 l22-28 22 28 h52 l22-28 22 28" fill="none" stroke="#2563eb" stroke-width="20"/>
    <path d="M55 175 h70 l22-28 22 28 h70" fill="none" stroke="#0f172a" stroke-width="20"/>
    <circle cx="132" cy="147" r="10" fill="#ef4444"/>
    <text x="150" y="235" text-anchor="middle" class="m">Forward-flank contact</text><text x="150" y="273" text-anchor="middle" class="s">torque transfer · compliance</text>
  </g>
  <path d="M375 260 H425" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  <g transform="translate(450 105)">
    <rect width="300" height="315" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <path d="M55 105 h52 l22-28 22 28 h52 l22-28 22 28" fill="none" stroke="#f97316" stroke-width="20"/>
    <path d="M55 195 h52 l22-28 22 28 h52 l22-28 22 28" fill="none" stroke="#0f172a" stroke-width="20"/>
    <path d="M90 150 H210" stroke="#ef4444" stroke-width="5" marker-end="url(#a)"/>
    <text x="150" y="235" text-anchor="middle" class="m">Crossing clearance</text><text x="150" y="273" text-anchor="middle" class="s">motor motion ≠ output motion</text>
  </g>
  <path d="M765 260 H815" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  <g transform="translate(840 105)">
    <rect width="300" height="315" rx="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
    <path d="M55 120 h70 l22-28 22 28 h70" fill="none" stroke="#16a34a" stroke-width="20"/>
    <path d="M55 175 h52 l22-28 22 28 h52 l22-28 22 28" fill="none" stroke="#0f172a" stroke-width="20"/>
    <circle cx="162" cy="147" r="10" fill="#ef4444"/>
    <text x="150" y="235" text-anchor="middle" class="m">Reverse-flank contact</text><text x="150" y="273" text-anchor="middle" class="s">impact, then reverse torque</text>
  </g>
  <rect x="250" y="460" width="700" height="65" rx="18" fill="#0f172a"/>
  <text x="600" y="502" text-anchor="middle" class="m" style="fill:#fff;font-size:18px">hidden state = contact flank + approach direction + load history</text>
</svg>
