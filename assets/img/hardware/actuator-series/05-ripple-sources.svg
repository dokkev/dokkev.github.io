<!-- Robot Hardware 05 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">토크 리플의 네 가지 원인</title>
  <desc id="desc">모터 형상, 자속과 권선 고조파, 인버터 PWM, 센싱과 전기각 오차가 실제 토크에 합쳐지는 구조</desc>
  <defs>
    <style>text{font-family:Pretendard,"Noto Sans KR",sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.m{font-size:19px;font-weight:650}.s{font-size:17px;fill:#475569}</style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="620" rx="24" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" class="h">Four paths from constant command to periodic torque error</text>
  <g transform="translate(55 105)">
    <rect width="245" height="200" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <circle cx="122" cy="72" r="44" fill="none" stroke="#f97316" stroke-width="11" stroke-dasharray="12 8"/>
    <text x="122" y="145" text-anchor="middle" class="m">Slot · magnet geometry</text><text x="122" y="176" text-anchor="middle" class="s">cogging / spatial period</text>
  </g>
  <g transform="translate(335 105)">
    <rect width="245" height="200" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
    <path d="M30 80 C60 20 90 140 120 80 S180 20 215 80" fill="none" stroke="#16a34a" stroke-width="7"/>
    <text x="122" y="145" text-anchor="middle" class="m">Flux · winding harmonics</text><text x="122" y="176" text-anchor="middle" class="s">saturation / non-sinusoidal EMF</text>
  </g>
  <g transform="translate(615 105)">
    <rect width="245" height="200" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <path d="M30 95 V45 H72 V125 H114 V45 H156 V125 H215" fill="none" stroke="#2563eb" stroke-width="7"/>
    <text x="122" y="145" text-anchor="middle" class="m">Inverter · PWM</text><text x="122" y="176" text-anchor="middle" class="s">dead time / voltage error</text>
  </g>
  <g transform="translate(895 105)">
    <rect width="245" height="200" rx="18" fill="#fdf2f8" stroke="#db2777" stroke-width="3"/>
    <circle cx="90" cy="78" r="38" fill="none" stroke="#db2777" stroke-width="6"/><path d="M90 78 L118 52" stroke="#db2777" stroke-width="7"/>
    <path d="M140 55 h70 M140 78 h50 M140 101 h63" stroke="#0f172a" stroke-width="5"/>
    <text x="122" y="145" text-anchor="middle" class="m">Sensing · electrical angle</text><text x="122" y="176" text-anchor="middle" class="s">offset / sampling / axis error</text>
  </g>
  <path d="M177 320 V385 H600 M457 320 V385 M737 320 V385 M1017 320 V385 H600" fill="none" stroke="#64748b" stroke-width="4"/>
  <path d="M600 385 V440" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  <rect x="405" y="455" width="390" height="105" rx="20" fill="#0f172a"/>
  <text x="600" y="500" text-anchor="middle" class="m" style="fill:#fff">Actual joint torque</text>
  <path d="M450 530 C490 490 530 570 570 530 S650 490 690 530 S750 550 770 520" fill="none" stroke="#fb7185" stroke-width="6"/>
  <text x="600" y="595" text-anchor="middle" class="s">Each source has a different synchrony with angle, speed, and PWM</text>
</svg>
