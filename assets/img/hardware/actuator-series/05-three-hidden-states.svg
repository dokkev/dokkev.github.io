<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">액추에이터의 세 가지 숨은 상태</title>
  <desc id="desc">전기각과 PWM, 기어 접촉 이력, 온도가 서로 다른 시간 척도에서 관절 토크를 변화시키는 그림</desc>
  <defs>
    <style>
      text{font-family:Pretendard,"Noto Sans KR",sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.m{font-size:23px;font-weight:650}.s{font-size:18px;fill:#475569}.tiny{font-size:16px;fill:#64748b}
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="560" rx="24" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" class="h">Three hidden states behind actuator error</text>
  <g transform="translate(55 95)">
    <rect width="330" height="330" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="165" cy="126" r="70" fill="none" stroke="#2563eb" stroke-width="12" stroke-dasharray="18 10"/>
    <path d="M165 126 L214 82" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    <circle cx="165" cy="126" r="9" fill="#0f172a"/>
    <text x="165" y="225" text-anchor="middle" class="m">Electrical angle · PWM</text>
    <text x="165" y="262" text-anchor="middle" class="s">Position / switching synchronous</text>
    <text x="165" y="296" text-anchor="middle" class="tiny">µs–ms / periodic</text>
  </g>
  <g transform="translate(435 95)">
    <rect width="330" height="330" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <path d="M65 115 h60 l18 25 18-25 h60 l18 25 18-25" fill="none" stroke="#f97316" stroke-width="16" stroke-linejoin="round"/>
    <path d="M70 165 h45 l18-25 18 25 h45 l18-25 18 25" fill="none" stroke="#0f172a" stroke-width="16" stroke-linejoin="round"/>
    <path d="M120 202 H210" stroke="#ef4444" stroke-width="5" marker-end="url(#a)"/>
    <text x="165" y="225" text-anchor="middle" class="m">Gear contact history</text>
    <text x="165" y="262" text-anchor="middle" class="s">Direction / load dependent</text>
    <text x="165" y="296" text-anchor="middle" class="tiny">ms–s / reversal</text>
  </g>
  <g transform="translate(815 95)">
    <rect width="330" height="330" rx="20" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
    <path d="M150 55 v105 a45 45 0 1 0 30 0 V55 a15 15 0 0 0-30 0z" fill="#fff" stroke="#ef4444" stroke-width="7"/>
    <rect x="158" y="100" width="14" height="100" rx="7" fill="#ef4444"/>
    <circle cx="165" cy="198" r="28" fill="#ef4444"/>
    <text x="165" y="225" text-anchor="middle" class="m">Winding · magnet temperature</text>
    <text x="165" y="262" text-anchor="middle" class="s">Resistance, flux, torque limit</text>
    <text x="165" y="296" text-anchor="middle" class="tiny">s–min / accumulated duty</text>
  </g>
  <path d="M220 455 V505 H980 V455" fill="none" stroke="#64748b" stroke-width="3"/>
  <text x="600" y="530" text-anchor="middle" class="m">Joint torque = f(command, electrical angle, contact history, temperature)</text>
</svg>
